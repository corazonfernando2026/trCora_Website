<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Stars After Sunrise — A Right Tool, Right Time Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#04122c;
    --navy:#0a2a63;
    --navy-soft:#123a7d;
    --ivory:#f6f1e4;
    --gold:#e8b923;
    --gold-bright:#ffd23f;
    --jade:#5a8a70;
    --maroon:#b3272d;
    --line: rgba(246,241,228,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 480px at 50% -6%, rgba(255,180,60,0.38) 0%, rgba(232,185,35,0.16) 32%, rgba(232,185,35,0) 65%),
      linear-gradient(180deg, #3d2410 0%, #5a3418 8%, var(--navy) 26%, var(--navy-deep) 62%, #050d20 100%);
    background-attachment: fixed;
    color:var(--ivory);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .display{ font-family:'Fraunces', serif; }
  .mono{ font-family:'JetBrains Mono', monospace; }
  a{color:inherit;}
  button{
    font-family:'Work Sans', sans-serif;
    cursor:pointer;
    border:none;
    border-radius:14px;
  }
  button:focus-visible, .tap:focus-visible{ outline:2px solid var(--gold-bright); outline-offset:3px; }

  #app{ max-width: 920px; margin:0 auto; padding: 28px 20px 60px; }

  .eyebrow{
    text-transform:uppercase; letter-spacing:.16em; font-size:11px;
    color:var(--gold); font-weight:600;
  }

  /* ---------- Mandala oneness ring (signature element) ---------- */
  .mandala-wrap{ display:flex; align-items:center; justify-content:center; margin: 18px 0 8px; }
  .mandala{ width:190px; height:190px; }
  .mandala circle.track{ fill:none; stroke:var(--line); stroke-width:2.5; }
  .mandala circle.progress{
    fill:none; stroke:var(--gold); stroke-width:5; stroke-linecap:round;
    transform-origin:center; transform:rotate(-90deg);
    transition: stroke-dashoffset .6s ease, stroke .4s ease;
  }
  .mandala .petal{ fill:none; stroke:rgba(212,175,106,0.35); stroke-width:1; }
  .mandala-center{ font-family:'Fraunces', serif; font-size:34px; fill:var(--ivory); }
  .mandala-label{ font-family:'Work Sans', sans-serif; font-size:10px; letter-spacing:.12em; fill:var(--gold); text-transform:uppercase; }

  /* ---------- Landing ---------- */
  .hero-title{ font-size: clamp(38px, 8vw, 64px); line-height:0.98; margin: 6px 0 4px; letter-spacing:-0.01em; }
  .hero-sub{ color: rgba(246,241,228,0.72); font-size:16px; max-width:520px; margin: 0 auto 30px; text-align:center; }

  .role-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; max-width:520px; margin: 0 auto; }
  @media (max-width:520px){ .role-grid{ grid-template-columns:1fr; } }
  .role-card{
    background:var(--navy-soft); border:1px solid var(--line); border-radius:18px;
    padding:22px 18px; text-align:left;
  }
  .role-card h3{ font-family:'Fraunces', serif; font-size:20px; margin:0 0 6px; }
  .role-card p{ font-size:13.5px; color:rgba(246,241,228,0.65); margin:0 0 16px; line-height:1.45;}
  .btn-primary{
    background:var(--gold); color:var(--navy-deep); font-weight:700; font-size:14.5px;
    padding:12px 18px; border-radius:12px; width:100%;
  }
  .btn-primary:hover{ background:var(--gold-bright); }
  .btn-ghost{
    background:transparent; color:var(--ivory); border:1px solid var(--line);
    font-size:13.5px; padding:10px 16px; border-radius:12px;
  }
  .btn-ghost:hover{ border-color:var(--gold); color:var(--gold); }

  .howto-link{ display:block; text-align:center; margin-top:22px; font-size:13px; color:rgba(246,241,228,0.55); text-decoration:underline; text-underline-offset:3px; background:none; }

  /* ---------- Instructions ---------- */
  .card{ background:var(--navy-soft); border:1px solid var(--line); border-radius:18px; padding:22px 22px; }
  .steps{ list-style:none; padding:0; margin:16px 0 0; counter-reset: step; }
  .steps li{ counter-increment: step; display:flex; gap:14px; padding:12px 0; border-top:1px solid var(--line); }
  .steps li:first-child{ border-top:none; }
  .steps li::before{
    content: counter(step); font-family:'Fraunces', serif; font-size:15px; color:var(--gold);
    border:1px solid var(--gold); width:26px; height:26px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .steps li span{ font-size:14.5px; line-height:1.5; padding-top:2px; }

  /* ---------- Host dashboard ---------- */
  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
  .round-tabs{ display:flex; gap:8px; flex-wrap:wrap; }
  .round-tab{
    background:transparent; border:1px solid var(--line); color:rgba(246,241,228,0.6);
    padding:8px 14px; border-radius:999px; font-size:12.5px; font-weight:600;
  }
  .round-tab.active{ background:var(--gold); color:var(--navy-deep); border-color:var(--gold); }
  .round-tab.done::after{ content:' ✓'; }

  .qcounter{ font-size:12px; color:rgba(246,241,228,0.55); }
  .progress-wrap{ margin:10px 0 4px; }
  .progress-label{ font-size:11px; color:rgba(246,241,228,0.55); text-transform:uppercase; letter-spacing:.08em; margin-bottom:5px; display:flex; justify-content:space-between; }
  .progress-track{ width:100%; height:8px; border-radius:99px; background:var(--navy); border:1px solid var(--line); overflow:hidden; }
  .progress-fill{ height:100%; border-radius:99px; background:linear-gradient(90deg, var(--gold) 0%, var(--gold-bright) 100%); transition:width .4s ease; }

  .scenario-card{ background:var(--navy-soft); border:1px solid var(--line); border-radius:20px; padding:26px; margin-top:14px; }
  .scenario-title{ font-family:'Fraunces', serif; font-size:15px; color:var(--gold); margin:0 0 10px; }
  .scenario-text{ font-size:19px; line-height:1.5; margin:0 0 18px; }

  .opt-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:560px){ .opt-grid{ grid-template-columns:1fr; } }
  .opt{
    background:var(--navy); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; font-size:14.5px; text-align:left; color:var(--ivory);
    display:flex; gap:10px; align-items:flex-start; position:relative; overflow:hidden;
  }
  .opt .letter{ font-family:'JetBrains Mono', monospace; color:var(--gold); font-weight:700; flex-shrink:0; }
  .opt .bar{ position:absolute; left:0; top:0; bottom:0; background:rgba(212,175,106,0.16); z-index:0; transition:width .5s ease; }
  .opt .pct{ margin-left:auto; font-family:'JetBrains Mono', monospace; font-size:13px; color:var(--gold); z-index:1; }
  .opt.correct{ border-color:var(--jade); }
  .opt.correct .bar{ background:rgba(90,138,112,0.28); }
  .opt.correct .check-badge{
    display:inline-flex; align-items:center; justify-content:center;
    width:20px; height:20px; border-radius:50%; flex-shrink:0;
    background:var(--jade); color:#fff; font-size:13px; font-weight:700;
    z-index:1; margin-left:6px;
  }
  .opt.wrong-winner{ border-color:var(--maroon); }

  .opt.tap{ transition: transform .1s ease, border-color .2s ease; }
  .opt.tap:active{ transform: scale(0.98); }
  .opt.selected{ border-color:var(--gold); box-shadow: 0 0 0 2px rgba(212,175,106,0.3) inset; }
  .opt:disabled{ opacity:1; }
  .submit-count{ font-size:11.5px; color:rgba(246,241,228,0.55); margin-top:4px; letter-spacing:.02em; }

  .note-box{ margin-top:18px; padding:14px 16px; border-left:3px solid var(--gold); background:rgba(212,175,106,0.06); border-radius:0 10px 10px 0; font-size:14px; line-height:1.55; color:rgba(246,241,228,0.85); }

  .host-controls{ display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }

  .side-panel{ display:flex; gap:14px; margin-top:18px; flex-wrap:wrap; }
  .qr-card{ background:var(--navy-soft); border:1px solid var(--line); border-radius:16px; padding:16px; text-align:center; flex:1; min-width:180px; }
  .qr-card .qr-holder{ border-radius:10px; background:#fff; padding:8px; width:150px; height:150px; margin:0 auto; }
  .qr-card .qr-holder svg{ display:block; width:100%; height:100%; }
  .qr-card .link{ font-size:11px; color:rgba(246,241,228,0.5); word-break:break-all; margin-top:8px; }
  .qr-url-box{ font-family:'JetBrains Mono', monospace; font-size:10.5px; color:rgba(246,241,228,0.6); background:var(--navy); border:1px solid var(--line); border-radius:8px; padding:8px; margin-top:8px; word-break:break-all; text-align:left; user-select:all; }
  .copy-btn{ margin-top:8px; width:100%; font-size:12.5px; padding:9px 12px; }
  .qr-warning{ background:rgba(164,82,79,0.18); border:1px solid var(--maroon); color:#f0d3d2; font-size:12px; line-height:1.5; padding:10px 12px; border-radius:10px; margin-top:10px; text-align:left; }
  .stat-card{ background:var(--navy-soft); border:1px solid var(--line); border-radius:16px; padding:16px; flex:1; min-width:140px; }
  .stat-card .num{ font-family:'JetBrains Mono', monospace; font-size:30px; color:var(--gold); }
  .stat-card .lbl{ font-size:11.5px; color:rgba(246,241,228,0.55); text-transform:uppercase; letter-spacing:.08em; }
  .roster-list{ margin-top:10px; padding-top:10px; border-top:1px solid var(--line); font-size:12.5px; line-height:1.7; color:rgba(246,241,228,0.75); max-height:110px; overflow-y:auto; text-align:left; }
  .roster-list .empty{ color:rgba(246,241,228,0.4); font-style:italic; }
  .join-input.error{ border-color:var(--maroon); }
  .setup-warning{ background:rgba(164,82,79,0.18); border:1px solid var(--maroon); color:#f0d3d2; font-size:13px; line-height:1.6; padding:14px 16px; border-radius:12px; margin:0 0 20px; text-align:left; }
  .setup-warning code{ background:rgba(0,0,0,0.25); padding:1px 5px; border-radius:5px; font-size:12px; }
  .music-toggle{
    position:fixed; bottom:16px; right:16px; z-index:9999;
    width:46px; height:46px; border-radius:50%;
    background:var(--navy-soft); border:1px solid var(--gold);
    color:var(--gold); font-size:19px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,0.4);
    transition: background .2s, color .2s, transform .2s;
  }
  .music-toggle:hover{ background:var(--gold); color:var(--navy-deep); transform:scale(1.05); }
  .music-toggle.playing{ border-color:var(--gold-bright); }

  .timer-ring-wrap{ display:flex; align-items:center; gap:12px; }

  /* ---------- Player view ---------- */
  .player-shell{ min-height:100vh; display:flex; flex-direction:column; }
  .waiting{ text-align:center; padding: 60px 20px; }
  .waiting .pulse{ width:70px; height:70px; margin: 0 auto 20px; border-radius:50%; border:2px solid var(--gold); animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse{ 0%{ transform:scale(0.9); opacity:0.5;} 50%{ transform:scale(1.05); opacity:1;} 100%{ transform:scale(0.9); opacity:0.5;} }

  .join-input{
    width:100%; background:var(--navy); border:1px solid var(--line); color:var(--ivory);
    padding:13px 14px; border-radius:12px; font-size:15px; margin-bottom:12px;
  }
  .join-input:focus{ outline:none; border-color:var(--gold); }

  .p-opt{ width:100%; text-align:left; }

  footer{ text-align:center; margin-top:40px; font-size:11.5px; color:rgba(246,241,228,0.35); }

  .final-score{ text-align:center; padding: 30px 0; }
  .final-num{ font-family:'Fraunces', serif; font-size:70px; color:var(--gold); }
  .close-line{ font-size:16px; line-height:1.6; max-width:560px; margin:18px auto 0; color:rgba(246,241,228,0.85); text-align:center; }

  .hidden{ display:none !important; }
</style>
</head>

<div id="app"></div>

<script id="qrcode-lib">
//---------------------------------------------------------------------
//
// QR Code Generator for JavaScript
//
// Copyright (c) 2009 Kazuhiko Arase
//
// URL: http://www.d-project.com/
//
// Licensed under the MIT license:
//  http://www.opensource.org/licenses/mit-license.php

// DENSO WAVE INCORPORATED
//  http://www.denso-wave.com/qrcode/faqpatent-e.html
//
//---------------------------------------------------------------------

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);

// front of players: the seed is derived from the id, so the host's screen
// and every player's phone independently land on the exact same order for
// a given question, every time, with no sync needed.
function hashSeed(str){
  let h = 2166136261;
  for(let i=0;i<str.length;i++){
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function seededRandom(seed){
  return function(){
    seed = (seed + 0x6D2B79F5) | 0;

    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function shuffleOptionsInPlace(q){
  const rand = seededRandom(hashSeed(q.id));
  const order = q.options.map((_,i)=>i);
  for(let i=order.length-1;i>0;i--){
    const j = Math.floor(rand()*(i+1));
    const tmp = order[i]; order[i] = order[j]; order[j] = tmp;
  }
  const correctOriginalIdx = q.correct;
  q.options = order.map(i=>q.options[i]);
  q.correct = order.indexOf(correctOriginalIdx);
}

/* ============================= STORAGE HELPERS =============================

   player's phone can all read and write — that's what makes votes and the
   player list show up on the host screen live. A page hosted on GitHub
   Pages is a static file with no server of its own, so that shared board

const FIREBASE_DB_URL = 'https://test-mode-6f80d-default-rtdb.asia-southeast1.firebasedatabase.app';

function isFirebaseConfigured(){
  return !!FIREBASE_DB_URL && !FIREBASE_DB_URL.includes('YOUR-PROJECT');
}

function keyToPath(key){
  return key.split(':').map(encodeURIComponent).join('/');
}

// A stalled or blocked request should never freeze the UI — cap every
// Firebase call so storeGet/storeSet always resolve within ~6 seconds.
function fetchWithTimeout(url, options, ms){
  ms = ms || 4000;
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), ms);
  return fetch(url, {...(options||{}), signal: controller.signal}).finally(()=>clearTimeout(timer));
}

async function storeGet(key){
  if(!isFirebaseConfigured()) return null;
  try{
    const res = await fetchWithTimeout(`${FIREBASE_DB_URL}/${keyToPath(key)}.json`, {cache:'no-store'});
    if(!res.ok) return null;
    return await res.json();
  }catch(e){ return null; }
}
async function storeSet(key, value){
  if(!isFirebaseConfigured()) return;
  try{
    await fetchWithTimeout(`${FIREBASE_DB_URL}/${keyToPath(key)}.json`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(value)
    });
  }catch(e){}
}
// Writes just one field under a key without overwriting the rest — used so
// two players joining at the same instant can't clobber each other.
async function storeSetField(baseKey, field, value){
  if(!isFirebaseConfigured()) return;
  try{
    await fetchWithTimeout(`${FIREBASE_DB_URL}/${keyToPath(baseKey)}/${encodeURIComponent(field)}.json`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(value)
    });
  }catch(e){}
}

const SESSION_KEY = 'itaidoshin:session';
function stateKey(id){ return 'itaidoshin:'+id+':state'; }
function votesKey(id, qid){ return 'itaidoshin:'+id+':votes:'+qid; }
function playersKey(id){ return 'itaidoshin:'+id+':players'; }

function defaultState(){

}

/* A "session" is one live game: a QR/id that stays valid across reloads and
   only goes away when the host explicitly ends it or starts a new one. */
async function getSession(){ return await storeGet(SESSION_KEY); }

async function createNewSession(){
  const id = 's'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const session = { id, status:'active', startedAt: Date.now() };
  await Promise.all([
    storeSet(SESSION_KEY, session),
    storeSet(stateKey(id), defaultState()),
    storeSet(playersKey(id), {})
  ]);
  return session;
}

async function ensureActiveSession(){
  let s = await getSession();
  if(!s || s.status !== 'active'){ s = await createNewSession(); }
  return s;
}

function buildQRSvg(text, opts){
  opts = opts || {};
  const cell = opts.cell || 4;
  const margin = opts.margin != null ? opts.margin : 4;
  const dark = opts.dark || '#0a1129';
  const light = opts.light || '#ffffff';
  const qr = qrcode(0, 'M');
  qr.addData(text);
  qr.make();
  const count = qr.getModuleCount();
  const size = count*cell + margin*2;
  let rects = '';
  for(let r=0;r<count;r++){
    for(let c=0;c<count;c++){
      if(qr.isDark(r,c)){
        rects += '<rect x="'+(c*cell+margin)+'" y="'+(r*cell+margin)+'" width="'+cell+'" height="'+cell+'"/>';
      }
    }
  }
  return '<svg viewBox="0 0 '+size+' '+size+'" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="QR code to join the game">'
    + '<rect width="'+size+'" height="'+size+'" fill="'+light+'"/>'
    + '<g fill="'+dark+'">'+rects+'</g>'
    + '</svg>';
}

function overallProgress(state){

function sunSVG(big){
  const size = big ? 190 : 120;
  const c = size/2;
  const r = size*0.22;
  const rayInner = r*1.35;
  const rayOuter = r*2.05;
  const rays = Array.from({length:12}).map((_,i)=>{
    const a = (i*30) * Math.PI/180;
    const x1 = c + Math.cos(a)*rayInner, y1 = c + Math.sin(a)*rayInner;
    const x2 = c + Math.cos(a)*rayOuter, y2 = c + Math.sin(a)*rayOuter;
    return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="var(--gold)" stroke-width="${big?3:2.2}" stroke-linecap="round" opacity="${i%2===0?0.9:0.5}"/>`;

  return `
  <svg class="sun-icon" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">

      <radialGradient id="sunGlow${big?'Big':'Sm'}" cx="50%" cy="50%" r="50%">

  </svg>`;
}

function mandalaSVG(pct, label, big, showPct){

let hostPollTimer = null;
let hostSessionId = null;

async function startHost(){
  const session = await ensureActiveSession();
  hostSessionId = session.id;
  let state = await storeGet(stateKey(hostSessionId));
  if(!state){ state = defaultState(); await storeSet(stateKey(hostSessionId), state); }
  renderHost(state);
  clearInterval(hostPollTimer);
  hostPollTimer = setInterval(async ()=>{
    const sess = await getSession();
    if(sess) hostSessionId = sess.id;
    const s = await storeGet(stateKey(hostSessionId));
    if(s) renderHost(s);
  }, 1500);
}

function currentQuestion(state){
  const round = ROUNDS[state.roundIdx];
  if(!round) return null;
  return round.questions[state.qIdx];
}

async function getVotes(sessionId, qid){
  return (await storeGet(votesKey(sessionId, qid))) || {0:0,1:0,2:0,3:0};
}
async function getPlayerRoster(sessionId){
  return (await storeGet(playersKey(sessionId))) || {};
}
async function getPlayerCount(sessionId){
  const roster = await getPlayerRoster(sessionId);
  return Object.keys(roster).length;
}

async function renderHost(state){
  const round = ROUNDS[state.roundIdx];
  if(!round){
    const sess = await getSession();
    if(sess && sess.status==='active'){ await storeSet(SESSION_KEY, {...sess, status:'ended'}); }
    return renderFinalHost(state);
  }
  const q = round.questions[state.qIdx];
  const votes = await getVotes(hostSessionId, q.id);
  const totalVotes = Object.values(votes).reduce((a,b)=>a+b,0);
  const roster = await getPlayerRoster(hostSessionId);
  const rosterNames = Object.values(roster).sort((a,b)=>(a.joinedAt||0)-(b.joinedAt||0)).map(p=>p.name);
  const playerCount = rosterNames.length;

  const now = Date.now();
  const secLeft = state.phase==='voting' ? Math.max(0, Math.ceil((state.voteEndAt-now)/1000)) : 0;
  if(state.phase==='voting' && secLeft<=0){
    state.phase='results';
    await storeSet(stateKey(hostSessionId), state);
  }

  const showResults = state.phase==='results';

  app.innerHTML='';
  app.appendChild(el(`
    <div>
      <div class="topbar">
        <div class="round-tabs">
          ${ROUNDS.map((r,i)=>`<div class="round-tab ${i===state.roundIdx?'active':''} ${i<state.roundIdx?'done':''}">${r.title}</div>`).join('')}
        </div>
        <div class="qcounter mono">Q ${state.qIdx+1} / ${round.questions.length} — Oneness Score <strong style="color:var(--gold)">${state.score}</strong></div>
      </div>
      ${progressBarHTML(state)}

      <div class="scenario-card">
        <div class="scenario-title display">${round.subtitle}</div>
        <p class="scenario-text">${q.scenario}</p>
        <div class="opt-grid" id="opts"></div>

        ${showResults ? `<div class="note-box">${q.note}</div>` : ''}
      </div>

      <div class="side-panel">
        <div class="qr-card">
          <div class="qr-holder" id="qr-holder"></div>
          <div class="link" id="qr-link"></div>
          <div class="qr-url-box" id="qr-url-text"></div>
          <button class="btn-ghost copy-btn" id="copy-link">Copy join link</button>
          <div id="qr-warning"></div>
        </div>
        <div class="stat-card">
          <div class="num mono">${playerCount}</div>
          <div class="lbl">players joined</div>
          <div class="roster-list">${rosterNames.length ? rosterNames.map(n=>escapeHtml(n)).join(', ') : '<span class="empty">Waiting for players…</span>'}</div>
        </div>
        <div class="stat-card">
          <div class="num mono">${state.phase==='voting' ? secLeft : totalVotes}</div>
          <div class="lbl">${state.phase==='voting' ? 'seconds left' : 'votes cast'}</div>
          ${state.phase==='voting' ? `<div class="submit-count">${totalVotes} of ${playerCount} submitted</div>` : ''}
        </div>
      </div>
      ${!isFirebaseConfigured() ? `<div class="setup-warning" style="margin-top:16px;"><strong>Storage isn't configured yet</strong> — votes and joins won't sync across devices until <code>FIREBASE_DB_URL</code> is set (see the comment above it in the code). Open voting will appear to do nothing until this is fixed.</div>` : ''}

      <div class="host-controls">
        ${state.phase==='idle' ? `<button class="btn-primary" id="open-vote">Open voting (${VOTE_SECONDS}s)</button>` : ''}
        ${state.phase==='voting' ? `<button class="btn-ghost" id="reveal-now">Reveal now</button>` : ''}
        ${state.phase==='results' ? `<button class="btn-primary" id="next-q">Next scenario</button>` : ''}
        <button class="btn-ghost" id="end-session">End session for everyone</button>
        <button class="btn-ghost" id="new-game">Start new game (new QR)</button>
      </div>
    </div>
  `));

  const qrHolder = document.getElementById('qr-holder');
  const linkUrl = joinUrl(hostSessionId);
  if(qrHolder) qrHolder.innerHTML = buildQRSvg(linkUrl);
  const qrLinkEl = document.getElementById('qr-link');
  if(qrLinkEl) qrLinkEl.textContent = 'Scan, or share the link below';
  const qrUrlEl = document.getElementById('qr-url-text');
  if(qrUrlEl) qrUrlEl.textContent = linkUrl;
  const copyBtn = document.getElementById('copy-link');
  if(copyBtn){
    copyBtn.onclick = async ()=>{
      const ok = await copyTextToClipboard(linkUrl);
      copyBtn.textContent = ok ? 'Copied ✓' : 'Tap the link above, then copy';
      setTimeout(()=>{ copyBtn.textContent = 'Copy join link'; }, 2200);
    };
  }
  const qrWarnEl = document.getElementById('qr-warning');
  if(qrWarnEl){
    const unreachable = location.protocol === 'file:' || location.hostname === '' || location.hostname === 'localhost';
    qrWarnEl.innerHTML = unreachable
      ? '<div class="qr-warning">This page isn\'t on a public link yet, so phones can\'t open this QR code. Publish or share this page first, then reopen it from that shared link before hosting.</div>'
      : '';
  }

  const optsWrap = document.getElementById('opts');
  q.options.forEach((opt,i)=>{
    const pct = totalVotes>0 ? Math.round((votes[i]||0)/totalVotes*100) : 0;
    const div = document.createElement('div');
    div.className = 'opt';
    if(showResults){
      const winnerIdx = Object.entries(votes).sort((a,b)=>b[1]-a[1])[0];
      const isWinner = winnerIdx && Number(winnerIdx[0])===i && totalVotes>0;
      if(i===q.correct) div.classList.add('correct');
      if(isWinner && i!==q.correct) div.classList.add('wrong-winner');
    }
    div.innerHTML = `<div class="bar" style="width:${showResults?pct:0}%"></div><span class="letter">${String.fromCharCode(65+i)}</span><span>${opt}</span>${showResults && i===q.correct?`<span class="check-badge">✓</span>`:''}${showResults?`<span class="pct">${pct}%</span>`:''}`;
    optsWrap.appendChild(div);
  });

  const openBtn = document.getElementById('open-vote');
  if(openBtn) openBtn.onclick = async ()=>{
    const s = await storeGet(stateKey(hostSessionId));
    s.phase='voting';
    s.voteEndAt = Date.now() + VOTE_SECONDS*1000;
    await storeSet(votesKey(hostSessionId, q.id), {0:0,1:0,2:0,3:0});
    await storeSet(stateKey(hostSessionId), s);
    renderHost(s);
  };
  const revealBtn = document.getElementById('reveal-now');
  if(revealBtn) revealBtn.onclick = async ()=>{
    const s = await storeGet(stateKey(hostSessionId));
    s.phase='results';
    await storeSet(stateKey(hostSessionId), s);
    renderHost(s);
  };
  const nextBtn = document.getElementById('next-q');
  if(nextBtn) nextBtn.onclick = async ()=>{
    const s = await storeGet(stateKey(hostSessionId));
    const v = await getVotes(hostSessionId, q.id);
    const total = Object.values(v).reduce((a,b)=>a+b,0);
    if(total>0){
      const winner = Object.entries(v).sort((a,b)=>b[1]-a[1])[0];
      const winnerIdx = Number(winner[0]);
      if(winnerIdx === q.correct){
        const pct = Math.round(v[q.correct]/total*100);
        s.score += pct;
      }
    }
    const r = ROUNDS[s.roundIdx];
    if(s.qIdx < r.questions.length-1){ s.qIdx += 1; }
    else{ s.roundIdx += 1; s.qIdx = 0; }
    s.phase='idle';
    s.voteEndAt = 0;
    await storeSet(stateKey(hostSessionId), s);
    renderHost(s);
  };
  document.getElementById('end-session').onclick = async ()=>{
    const sess = await getSession();
    if(sess){ await storeSet(SESSION_KEY, {...sess, status:'ended'}); }
    const s = await storeGet(stateKey(hostSessionId));
    renderFinalHost(s || state);
  };
  document.getElementById('new-game').onclick = async ()=>{
    const session = await createNewSession();
    hostSessionId = session.id;
    const fresh = defaultState();
    renderHost(fresh);
  };
}

function renderFinalHost(state){
  clearInterval(hostPollTimer);
  app.innerHTML='';
  app.appendChild(el(`
    <div>
      <div class="final-score">
        <div class="eyebrow">Final result</div>
        <div class="mandala-wrap">${mandalaSVG(Math.min(100, state.score/TOTAL_QUESTIONS), null, true)}</div>
        <div class="final-num mono">${state.score}</div>
        <div class="eyebrow" style="color:rgba(246,241,228,0.6);">total oneness score</div>
        <p class="close-line">${CLOSING_LINE}</p>
        <button class="btn-ghost" id="restart" style="margin-top:24px;">Start new game (new QR)</button>
      </div>
    </div>
  `));
  document.getElementById('restart').onclick = async ()=>{
    const session = await createNewSession();
    hostSessionId = session.id;
    startHost();
  };
}

/* ============================= PLAYER ============================= */

let playerPollTimer = null;
let hasJoined = false;
let playerSessionId = null;
let votedFor = {};
let playerName = localStorage.getItem('itaidoshin_player_name') || '';
let joinRenderedFor = null; // guards against re-rendering the join screen mid-typing

async function startPlayer(){
  await pollPlayer();
  clearInterval(playerPollTimer);
  playerPollTimer = setInterval(pollPlayer, 1500);
}

function renderNoGameYet(){
  app.innerHTML='';
  app.appendChild(el(`
    <div class="player-shell">
      <div class="waiting">
        <div class="pulse"></div>
        <div class="eyebrow">Not started yet</div>
        <h2 class="display" style="font-size:24px;">Waiting for the host to start the game…</h2>
        <p class="hero-sub">This screen will update the moment they do.</p>
      </div>
    </div>
  `));
}

function renderSessionEnded(){
  app.innerHTML='';
  app.appendChild(el(`
    <div class="player-shell">
      <div class="waiting">
        <div class="pulse"></div>
        <div class="eyebrow">Session ended</div>
        <h2 class="display" style="font-size:24px;">Waiting for the host to start a new game…</h2>
        <p class="hero-sub">You'll be brought in automatically when they do.</p>
      </div>
    </div>
  `));
}

function renderJoin(){
  app.innerHTML='';
  const savedName = localStorage.getItem('itaidoshin_player_name') || '';
  app.appendChild(el(`
    <div class="player-shell">
      <div style="text-align:center; padding-top:40px;">
        <div class="mandala-wrap">${sunSVG(true)}</div>
        <h1 class="display" style="font-size:32px; margin:8px 0 4px;">STARS AFTER SUNRISE</h1>
        <p class="hero-sub">Type your name to add your vote to the group.</p>
      </div>
      <div class="card">
        <input class="join-input" id="name-input" type="text" placeholder="Your name" maxlength="24" autocomplete="off" value="${escapeHtml(savedName)}" />
        <button class="btn-primary" id="join-btn">Join as a player</button>
      </div>
    </div>
  `));
  const nameInput = document.getElementById('name-input');
  const joinBtn = document.getElementById('join-btn');
  nameInput.addEventListener('input', ()=> nameInput.classList.remove('error'));
  nameInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') joinBtn.click(); });
  joinBtn.onclick = async ()=>{
    const name = nameInput.value.trim();
    if(!name){ nameInput.classList.add('error'); nameInput.focus(); return; }
    localStorage.setItem('itaidoshin_player_name', name);
    playerName = name;
    joinBtn.disabled = true; joinBtn.textContent = 'Joining…';
    const pid = getPlayerId();
    await storeSetField(playersKey(playerSessionId), pid, {name, joinedAt: Date.now()});
    hasJoined = true;
    pollPlayer();
  };
}

async function pollPlayer(){
  const sess = await getSession();

  if(!sess){ playerSessionId=null; hasJoined=false; return renderNoGameYet(); }

  if(sess.status === 'ended'){
    if(playerSessionId === sess.id){
      const state = await storeGet(stateKey(sess.id));
      return renderFinalPlayer(state || defaultState());
    }
    playerSessionId = sess.id; hasJoined = false;
    return renderSessionEnded();
  }

  // an active session exists
  if(playerSessionId !== sess.id){
    const wasAlreadyPlaying = hasJoined && playerSessionId !== null;
    playerSessionId = sess.id;
    if(wasAlreadyPlaying){
      // host started a fresh game while I was still connected — follow along automatically
      const pid = getPlayerId();
      const name = playerName || localStorage.getItem('itaidoshin_player_name') || 'Player';
      await storeSetField(playersKey(playerSessionId), pid, {name, joinedAt: Date.now()});
    } else {
      hasJoined = false;
    }
  }

  if(!hasJoined){
    if(joinRenderedFor !== sess.id){
      joinRenderedFor = sess.id;
      renderJoin();
    }
    return;
  }
  joinRenderedFor = null;

  const state = await storeGet(stateKey(playerSessionId));
  if(!state){ return renderNoGameYet(); }
  const round = ROUNDS[state.roundIdx];
  if(!round){ return renderFinalPlayer(state); }
  const q = round.questions[state.qIdx];

  if(state.phase==='idle'){
    renderWaiting(round);
  } else if(state.phase==='voting'){
    await renderVoting(state, round, q);
  } else if(state.phase==='results'){
    await renderPlayerResults(state, round, q);
  }
}

function renderWaiting(round){
  app.innerHTML='';
  app.appendChild(el(`
    <div class="player-shell">
      <div class="waiting">
        <div class="pulse"></div>
        <div class="eyebrow">${round.subtitle}</div>
        <h2 class="display" style="font-size:24px;">Waiting for the next scenario…</h2>
        <p class="hero-sub">Keep your eyes on the shared screen.</p>
      </div>
    </div>
  `));
}

async function renderVoting(state, round, q){
  const voteKey = playerSessionId+'::'+q.id;
  const alreadyVoted = votedFor[voteKey] !== undefined;
  const [votes, roster] = await Promise.all([
    getVotes(playerSessionId, q.id),
    getPlayerRoster(playerSessionId)
  ]);
  const submittedCount = Object.values(votes).reduce((a,b)=>a+b,0);
  const playerCount = Object.keys(roster).length;
  app.innerHTML='';
  const wrap = el(`
    <div class="player-shell">
      <div style="padding-top:10px;">
        <div class="eyebrow">${round.subtitle}</div>
        ${progressBarHTML(state)}
        <p class="scenario-text" style="font-size:17px;">${q.scenario}</p>
        <div id="p-opts"></div>
        ${alreadyVoted ? `<div class="note-box">Vote submitted. Waiting on the group…<br><span class="submit-count">${submittedCount} of ${playerCount} submitted</span></div>` : `<p style="text-align:center; color:rgba(246,241,228,0.5); font-size:12.5px;">Tap the answer that feels right.</p>`}
      </div>
    </div>
  `);
  app.appendChild(wrap);
  const optsWrap = wrap.querySelector('#p-opts');
  q.options.forEach((opt,i)=>{
    const b = document.createElement('button');
    b.className = 'opt tap p-opt' + (votedFor[voteKey]===i ? ' selected':'');
    b.disabled = alreadyVoted;
    b.style.marginBottom = '10px';
    b.innerHTML = `<span class="letter">${String.fromCharCode(65+i)}</span><span>${opt}</span>`;
    b.onclick = async ()=>{
      if(votedFor[voteKey]!==undefined) return;
      votedFor[voteKey] = i;
      const v = await getVotes(playerSessionId, q.id);
      v[i] = (v[i]||0)+1;
      await storeSet(votesKey(playerSessionId, q.id), v);
      renderVoting(state, round, q);
    };
    optsWrap.appendChild(b);
  });
}

async function renderPlayerResults(state, round, q){
  const votes = await getVotes(playerSessionId, q.id);
  const total = Object.values(votes).reduce((a,b)=>a+b,0);
  const myVote = votedFor[playerSessionId+'::'+q.id];
  app.innerHTML='';
  app.appendChild(el(`
    <div class="player-shell">
      <div style="padding-top:10px;">
        <div class="eyebrow">${round.subtitle}</div>
        ${progressBarHTML(state)}
        <p class="scenario-text" style="font-size:17px;">${q.scenario}</p>
        <div id="p-res"></div>
        <div class="note-box">${q.note}</div>
        <p style="text-align:center; color:rgba(246,241,228,0.5); font-size:12.5px; margin-top:14px;">${myVote===q.correct? "You were aligned with the right answer." : "Look at the next scenario together."}</p>
      </div>
    </div>
  `));
  const resWrap = document.getElementById('p-res');
  q.options.forEach((opt,i)=>{
    const pct = total>0 ? Math.round((votes[i]||0)/total*100) : 0;
    const div = document.createElement('div');
    div.className = 'opt';
    if(i===q.correct) div.classList.add('correct');
    div.style.marginBottom='10px';
    div.innerHTML = `<div class="bar" style="width:${pct}%"></div><span class="letter">${String.fromCharCode(65+i)}</span><span>${opt}</span>${i===q.correct?`<span class="check-badge">✓</span>`:''}<span class="pct">${pct}%</span>`;
    resWrap.appendChild(div);
  });
}

function renderFinalPlayer(state){
  app.innerHTML='';
  app.appendChild(el(`
    <div class="player-shell final-score">
      <div class="eyebrow">Final result</div>
      <div class="mandala-wrap">${mandalaSVG(Math.min(100, state.score/TOTAL_QUESTIONS), null, true)}</div>
      <div class="final-num mono">${state.score}</div>
      <div class="eyebrow" style="color:rgba(246,241,228,0.6);">total oneness score</div>
      <p class="close-line">${CLOSING_LINE}</p>
    </div>
  `));
}

/* ============================= AMBIENT MUSIC =============================
   "Popstar hook" — a catchy, high-energy synth-pop loop: a steady bass
   pulse under a bright, glossy melodic hook that repeats. No audio file
   needed, so it works straight from GitHub Pages with no extra hosting.
   Browsers block audio from starting on its own, so it only begins once
   someone taps the round button in the corner (that tap is what "unlocks"
   audio). Each device (host laptop, each phone) has its own independent
   on/off. */

let audioCtx = null;
let musicNodes = null;
let musicPlaying = false;
let hookTimer = null;
let bassTimer = null;

function ensureAudioCtx(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  return audioCtx;
}

const HOOK_NOTES = [523.25, 523.25, 587.33, 659.25, 587.33, 523.25, 493.88, 523.25]; // C5 C5 D5 E5 D5 C5 B4 C5
const HOOK_STEP_SEC = 0.24;
const BASS_NOTE = 130.81; // C3
const BASS_STEP_SEC = 1.2;

function playNote(freq, dur, type, vol){
  if(!audioCtx || !musicNodes) return;
  const ctx = audioCtx;
  const o = ctx.createOscillator();
  o.type = type;
  o.frequency.value = freq;
  const g = ctx.createGain();
  g.gain.value = 0;
  g.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
  o.connect(g);
  g.connect(musicNodes.master);
  o.start();
  o.stop(ctx.currentTime + dur + 0.05);
}

function scheduleHook(){
  clearTimeout(hookTimer);
  if(!musicPlaying || !audioCtx || !musicNodes) return;
  const i = musicNodes.hookIdx;
  playNote(HOOK_NOTES[i % HOOK_NOTES.length], 0.3, 'triangle', 0.075);
  musicNodes.hookIdx = i + 1;
  hookTimer = setTimeout(scheduleHook, HOOK_STEP_SEC*1000);
}

function scheduleBass(){
  clearTimeout(bassTimer);
  if(!musicPlaying || !audioCtx) return;
  playNote(BASS_NOTE, 1.1, 'sine', 0.06);
  bassTimer = setTimeout(scheduleBass, BASS_STEP_SEC*1000);
}

function startMusic(){
  const ctx = ensureAudioCtx();
  if(!ctx) return;
  if(ctx.state === 'suspended') ctx.resume();
  if(musicNodes) return;

  const master = ctx.createGain();
  master.gain.value = 0.0;
  master.connect(ctx.destination);
  master.gain.linearRampToValueAtTime(0.22, ctx.currentTime + 1.2);

  musicNodes = { master, hookIdx: 0 };
  musicPlaying = true;
  scheduleHook();
  scheduleBass();
}

function stopMusic(){
  musicPlaying = false;
  clearTimeout(hookTimer);
  clearTimeout(bassTimer);
  if(!musicNodes || !audioCtx){ musicNodes = null; return; }
  const ctx = audioCtx;
  musicNodes.master.gain.linearRampToValueAtTime(0.0, ctx.currentTime + 0.6);
  musicNodes = null;
}

function toggleMusic(){
  if(musicPlaying){ stopMusic(); } else { startMusic(); }
  localStorage.setItem('stars_music_on', musicPlaying ? '1' : '0');
  updateMusicButton();
}

function updateMusicButton(){
  const btn = document.getElementById('music-toggle');
  if(!btn) return;
  btn.textContent = musicPlaying ? '🔊' : '🔇';
  btn.classList.toggle('playing', musicPlaying);
  btn.setAttribute('aria-label', musicPlaying ? 'Mute background music' : 'Play background music');
}

function initMusicButton(){
  const btn = document.createElement('button');
  btn.id = 'music-toggle';
  btn.type = 'button';
  btn.className = 'music-toggle';
  btn.textContent = '🔇';
  btn.setAttribute('aria-label', 'Play background music');
  btn.onclick = toggleMusic;
  document.body.appendChild(btn);
}
initMusicButton();

/* ============================= BOOT ============================= */

if(isPlayer){ startPlayer(); }
else{ renderLanding(); }

</script>
